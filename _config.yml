title: Physics Study Notes
description: >-
  Bilingual (English · 中文) graduate-physics study notes — from classical
  mechanics to the Standard Model — with full step-by-step derivations,
  rendered with LaTeX math.

# GitHub Pages project site (served from main / root)
url: "https://yimincong.github.io"
baseurl: "/physics"

# Just-the-Docs theme (pulled at build time on GitHub Pages)
remote_theme: just-the-docs/just-the-docs@v0.10.1

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-readme-index
  - jekyll-sitemap

# Convert in-page ./module-x.md links to their built .html URLs
relative_links:
  enabled: true
  collections: false

# Use the root README (which has front matter) as the site homepage
readme_index:
  with_frontmatter: true

# ---- Just-the-Docs options ----
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true
color_scheme: light

aux_links:
  "View on GitHub":
    - "https://github.com/YiminCong/physics"
aux_links_new_tab: true

# Apply the theme layout to every markdown page (none of the notes set it explicitly)
defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - "*.py"
  - "*.js"
  - node_modules
