site_name: Physics Study Notes
site_description: >-
  Bilingual (English · 中文) graduate-physics study notes — from classical
  mechanics to the Standard Model — with full step-by-step LaTeX derivations.
site_url: https://yimincong.github.io/physics/
repo_url: https://github.com/YiminCong/physics
repo_name: YiminCong/physics
docs_dir: .

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - same-dir

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

exclude_docs: |
  requirements.txt
  Gemfile
  Gemfile.lock

not_in_nav: |
  *-derivations.md

nav:
  - Home: README.md
  - "Phase 0 — Mathematical Foundations":
